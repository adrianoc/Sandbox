name: check-service-labels

permissions:
  pull-requests: read

on:
  pull_request:
    types: [opened, edited, reopened, labeled, unlabeled, synchronize]
    branches:
      - '*'

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
    - name: Check 'god-approves' label
      run: |
        echo "Merging permission is enabled for servicing PRs when the `god-approves` label is applied."
        if [ "${{ contains(github.event.pull_request.labels.*.name, 'god-approves') }}" = "true" ]; then
          exit 0
        else
          echo "::error:: 'god-approves' label not applied to the PR yet. More information: https://github.com/dotnet/runtime/blob/main/docs/project/library-servicing.md#approval-process"
          exit 1
        fi
